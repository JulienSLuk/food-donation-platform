<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Donation Platform</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1, h2 {
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .list-item {
      background: #334155;
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
    }

    .claimed {
      opacity: 0.7;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Food Donation Platform</h1>
    <p>Connect food donors with people and organizations in need.</p>

    <div class="grid">
      <div class="card">
        <h2>Offer Food Donation</h2>
        <form id="donationForm">
          <input type="text" id="donor_name" placeholder="Donor Name" required />
          <input type="text" id="food_item" placeholder="Food Item" required />
          <input type="text" id="quantity" placeholder="Quantity" required />
          <input type="text" id="expiry_date" placeholder="Expiry Date (optional)" />
          <input type="text" id="location" placeholder="Location" required />
          <button type="submit">Submit Donation</button>
        </form>
      </div>

      <div class="card">
        <h2>Request Food</h2>
        <form id="requestForm">
          <input type="text" id="requester_name" placeholder="Requester Name" required />
          <input type="text" id="needed_item" placeholder="Needed Item" required />
          <input type="text" id="request_quantity" placeholder="Quantity" required />
          <input type="text" id="request_location" placeholder="Location" required />
          <textarea id="notes" placeholder="Notes"></textarea>
          <button type="submit">Submit Request</button>
        </form>
      </div>
    </div>

    <div class="grid" style="margin-top: 24px;">
      <div class="card">
        <h2>Available Donations</h2>
        <div id="donationsList"></div>
      </div>

      <div class="card">
        <h2>Food Requests</h2>
        <div id="requestsList"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Suggested Matches</h2>
    <div id="matchesList"></div>
  </div>

  <div class="card" style="margin-top: 24px;">
    <h2>Demand Prediction</h2>
    <form id="predictionForm">
      <input type="text" id="predict_location" placeholder="Location" required />
      <input type="text" id="predict_food_type" placeholder="Food Type" required />
      <input type="number" id="predict_requests" placeholder="Number of Requests" required />
      <button type="submit">Predict Demand</button>
    </form>

    <div id="predictionResult" style="margin-top: 16px;"></div>
  </div>

  <div class="card" style="margin-top: 24px;">
    <h2>Donation & Request Map</h2>
    <div id="map" style="height: 420px; border-radius: 12px; margin-top: 12px;"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>

    const locationCoordinates = {
      "Jurong": [1.3329, 103.7436],
      "Woodlands": [1.4382, 103.7890],
      "Tampines": [1.3496, 103.9568],
      "Bedok": [1.3236, 103.9273],
      "Yishun": [1.4291, 103.8350],
      "Orchard": [1.3048, 103.8318],
      "Bishan": [1.3509, 103.8485],
      "Toa Payoh": [1.3343, 103.8563]
    };

    let map;
    let mapMarkers = [];

    function initializeMap() {
      map = L.map("map").setView([1.3521, 103.8198], 11);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);
    }

    function clearMapMarkers() {
      mapMarkers.forEach(marker => map.removeLayer(marker));
      mapMarkers = [];
    }

    function addMarker(lat, lng, popupText) {
      const marker = L.marker([lat, lng]).addTo(map);
      marker.bindPopup(popupText);
      mapMarkers.push(marker);
    }

    async function loadMapData() {
      const donationsRes = await fetch("/donations");
      const donations = await donationsRes.json();

      const requestsRes = await fetch("/requests");
      const requests = await requestsRes.json();

      clearMapMarkers();

      donations.forEach(donation => {
        const coords = locationCoordinates[donation.location];
        if (coords) {
          addMarker(
            coords[0],
            coords[1],
            `
              <strong>Donation</strong><br>
              Item: ${donation.food_item}<br>
              Donor: ${donation.donor_name}<br>
              Quantity: ${donation.quantity}<br>
              Status: ${donation.status}<br>
              Location: ${donation.location}
            `
          );
        }
      });

      requests.forEach(request => {
        const coords = locationCoordinates[request.location];
        if (coords) {
          addMarker(
            coords[0],
            coords[1],
            `
              <strong>Request</strong><br>
              Item: ${request.needed_item}<br>
              Requester: ${request.requester_name}<br>
              Quantity: ${request.quantity}<br>
              Location: ${request.location}
            `
          );
        }
      });
    }

    async function loadDonations() {
      const res = await fetch("/donations");
      const donations = await res.json();
      const list = document.getElementById("donationsList");
      list.innerHTML = "";

      donations.forEach(donation => {
        const item = document.createElement("div");
        item.className = "list-item " + (donation.status === "claimed" ? "claimed" : "");
        item.innerHTML = `
          <strong>${donation.food_item}</strong><br>
          Donor: ${donation.donor_name}<br>
          Quantity: ${donation.quantity}<br>
          Expiry: ${donation.expiry_date || "N/A"}<br>
          Location: ${donation.location}<br>
          Status: ${donation.status}
          ${donation.status === "available" ? `<br><button onclick="claimDonation(${donation.id})">Mark as Claimed</button>` : ""}
        `;
        list.appendChild(item);
      });
    }

    async function loadRequests() {
      const res = await fetch("/requests");
      const requests = await res.json();
      const list = document.getElementById("requestsList");
      list.innerHTML = "";

      requests.forEach(request => {
        const item = document.createElement("div");
        item.className = "list-item";
        item.innerHTML = `
          <strong>${request.needed_item}</strong><br>
          Requester: ${request.requester_name}<br>
          Quantity: ${request.quantity}<br>
          Location: ${request.location}<br>
          Notes: ${request.notes || "N/A"}
        `;
        list.appendChild(item);
      });
    }

    async function claimDonation(id) {
      await fetch(`/donations/${id}/claim`, { method: "PATCH" });
      loadDonations();
    }

    document.getElementById("donationForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        donor_name: document.getElementById("donor_name").value,
        food_item: document.getElementById("food_item").value,
        quantity: document.getElementById("quantity").value,
        expiry_date: document.getElementById("expiry_date").value,
        location: document.getElementById("location").value
      };

      await fetch("/donations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      e.target.reset();
      loadDonations();
    });

    document.getElementById("requestForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        requester_name: document.getElementById("requester_name").value,
        needed_item: document.getElementById("needed_item").value,
        quantity: document.getElementById("request_quantity").value,
        location: document.getElementById("request_location").value,
        notes: document.getElementById("notes").value
      };

      await fetch("/requests", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      e.target.reset();
      loadRequests();
    });

    async function loadMatches() {
      const res = await fetch("/matches");
      const matches = await res.json();

      const list = document.getElementById("matchesList");
      list.innerHTML = "";

      matches.forEach(match => {
        const item = document.createElement("div");

        item.className = "list-item";

        item.innerHTML = `
          <strong>${match.food_item}</strong><br>
          Requester: ${match.requester}<br>
          Location: ${match.location}
        `;

        list.appendChild(item);
      });
    }

    document.getElementById("predictionForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const location = document.getElementById("predict_location").value;
      const foodType = document.getElementById("predict_food_type").value;
      const requests = document.getElementById("predict_requests").value;

      const res = await fetch(`/predict-demand?location=${encodeURIComponent(location)}&food_type=${encodeURIComponent(foodType)}&requests=${requests}`);
      const data = await res.json();

      document.getElementById("predictionResult").innerHTML = `
        <div class="list-item">
          <strong>Predicted Demand:</strong> ${data.predicted_demand}<br>
          Location: ${data.location}<br>
          Food Type: ${data.food_type}<br>
          Requests: ${data.requests}
        </div>
      `;
    });

    initializeMap();
    loadDonations();
    loadRequests();
    loadMatches();
    loadMapData();

  </script>
</body>
</html>
